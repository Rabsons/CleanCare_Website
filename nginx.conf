# =============================================================================
# CleanCare Solutions — Nginx Configuration
# Blueprint §6: Security headers + TLS termination + reverse proxy
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Information Disclosure Prevention
    # Remove server version from headers and error pages
    # -------------------------------------------------------------------------
    server_tokens off;

    # -------------------------------------------------------------------------
    # Logging — structured, no sensitive data
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"remote_addr":"$remote_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # Performance & Security Basics
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 6M;          # Slightly above app limit (5 MB) for overhead
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    reset_timedout_connection on;

    # -------------------------------------------------------------------------
    # TLS Configuration
    # Blueprint §1.1: TLS 1.3+, HSTS enforced
    # -------------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;   # TLS 1.0/1.1 disabled
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
                'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
                'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;    # TLS 1.3 manages this itself
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Security Header Map (applied to all server blocks below)
    # Blueprint §6
    # -------------------------------------------------------------------------
    # These are applied via add_header in each location block to allow
    # granular control. The FastAPI middleware also sets them as defence-in-depth.

    # -------------------------------------------------------------------------
    # Redirect all HTTP → HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name cleancare.example.com;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # Main HTTPS Server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name cleancare.example.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # -----------------------------------------------------------------
        # Security Headers — Blueprint §6
        # Applied at edge so application bugs cannot bypass them.
        # -----------------------------------------------------------------

        # HSTS: 1 year, include subdomains, preload-ready
        add_header Strict-Transport-Security
            "max-age=31536000; includeSubDomains; preload" always;

        # No framing — clickjacking prevention
        add_header X-Frame-Options "DENY" always;

        # No MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions — disable unused browser features
        add_header Permissions-Policy
            "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

        # XSS auditor disabled (CSP is the actual control)
        add_header X-XSS-Protection "0" always;

        # CSP — note: nonce is injected per-request by FastAPI middleware;
        # Nginx sets a base CSP and FastAPI overrides/extends it in the response.
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Remove information-disclosure headers from upstream
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # -----------------------------------------------------------------
        # Proxy to FastAPI backend
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;         # Blueprint §1.1
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";                   # Disable keep-alive header passthrough

            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;

            # Cache-Control for authenticated API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        # -----------------------------------------------------------------
        # Static frontend assets
        # -----------------------------------------------------------------
        location /static/ {
            alias /var/www/cleancare/static/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            gzip_static on;
        }

        # -----------------------------------------------------------------
        # Frontend (SPA / HTML pages)
        # -----------------------------------------------------------------
        location / {
            root /var/www/cleancare;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=300, must-revalidate";
        }

        # -----------------------------------------------------------------
        # Block common attack paths
        # -----------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
        }
        location ~* \.(env|git|sql|bak|log|conf)$ {
            deny all;
            access_log off;
        }
    }
}
