# =============================================================================
# CleanCare Solutions — Docker Compose
# Spins up: FastAPI backend + Redis + Nginx (+ Postgres for prod profile)
# =============================================================================
# Development: docker compose up
# Production:  docker compose --profile production up

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cleancare_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/private/uploads
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Session Store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cleancare_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Redis is NOT exposed to the host — internal network only

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy + TLS Termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cleancare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/var/www/cleancare:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # PostgreSQL — Production profile only
  # In development, SQLite is used (no extra service needed).
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cleancare_db
    profiles: ["production"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: cleancare_prod
      POSTGRES_USER: cleancare_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_db_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleancare_app -d cleancare_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB is NOT exposed to the host — internal network only

# ---------------------------------------------------------------------------
# Networks — isolate DB and Redis from external access
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    internal: true          # No direct internet access
  external:
    driver: bridge          # Only Nginx touches the outside world

# ---------------------------------------------------------------------------
# Persistent Volumes
# ---------------------------------------------------------------------------
volumes:
  redis_data:
  postgres_data:
  uploads_data:
  certbot_webroot:
